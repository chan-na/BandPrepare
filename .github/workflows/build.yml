name: build

# Phase 5 scaffold (PORTABLE-GUI-ROADMAP.md): per-platform PyInstaller bundles.
# torch is native and capped at <2.3 (last Intel-mac wheels), so a single
# universal binary is impossible — we build one bundle per OS/arch (D1/D7):
#   macos-13 = Intel x86_64, macos-14 = Apple Silicon arm64, Linux/Win = x86_64.
#
# CI status: linux-x86_64 / macos-arm64 / windows-x86_64 build + frozen self-test
# pass. macos-13 (Intel) runners are often unavailable, so that job is marked
# experimental (continue-on-error) and the arch is validated/released manually.
# On a v* tag, each job also attaches its bundle archive to the GitHub Release.
# Code signing / notarization (Phase 5) needs paid certs — placeholders below.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    # A stuck/failing Intel (macos-13) job must not fail the workflow or block a
    # tagged release; that arch is validated locally and uploaded manually.
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: write   # attach assets to the GitHub Release (tag pushes only)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13      # Intel x86_64
            label: macos-x86_64
            experimental: true
          - os: macos-14      # Apple Silicon arm64
            label: macos-arm64
          - os: ubuntu-latest # Linux x86_64
            label: linux-x86_64
          - os: windows-latest # Windows x86_64
            label: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # PySide6 (even the offscreen platform) needs a few system libs on Linux.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          # Default PyPI wheels keep this simple. To shrink Linux/Windows bundles,
          # a CPU-only torch (--index-url https://download.pytorch.org/whl/cpu)
          # could be installed first — left as a Phase 5 size optimization.
          pip install -e ".[gui,build,dev]"

      - name: Run tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build bundle
        run: pyinstaller --noconfirm bandprepare.spec

      # Frozen smoke test: the bundle must run with NO system ffmpeg and find its
      # bundled deps (see gui.main BANDPREPARE_GUI_SELFTEST). Run from a cwd with
      # an empty PATH segment so a system ffmpeg, if present, is ignored.
      - name: Frozen self-test (Unix)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        run: ./dist/bandprepare/bandprepare

      - name: Frozen self-test (Windows)
        if: runner.os == 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        run: .\dist\bandprepare\bandprepare.exe

      # --- Code signing / notarization (Phase 5, needs paid certs) ------------
      # macOS: import a Developer ID cert, codesign dist/bandprepare/**, package
      #        as a .app/.dmg, then notarize with `xcrun notarytool submit`.
      # Windows: signtool sign /fd sha256 /tr <timestamp> dist\bandprepare\*.exe
      # Gate these on repository secrets; skipped here.

      - uses: actions/upload-artifact@v4
        with:
          name: bandprepare-${{ matrix.label }}
          path: dist/bandprepare
          if-no-files-found: error

      # --- Release assets (v* tag pushes only) --------------------------------
      # Package the onedir bundle into one archive and attach it to the tag's
      # GitHub Release. tar.gz on Unix preserves symlinks + exec bits (PyInstaller
      # bundles have both); Compress-Archive (zip) is fine on Windows. Each matrix
      # job appends its own asset to the release that the action auto-creates.
      - name: Package bundle (Unix)
        if: runner.os != 'Windows' && startsWith(github.ref, 'refs/tags/')
        run: tar -C dist -czf "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.tar.gz" bandprepare

      - name: Package bundle (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist\bandprepare -DestinationPath "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.zip"

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Draft so the release stays hidden until the (unsigned) bundles are
          # reviewed and the manually-built Intel asset is attached, then publish.
          draft: true
          files: |
            bandprepare-${{ matrix.label }}-*.tar.gz
            bandprepare-${{ matrix.label }}-*.zip
