name: build

# Per-platform PyInstaller bundles (see ARCHITECTURE.md §12). torch is native and
# has no macOS universal2 wheel, so a single universal binary is impossible — we
# build one bundle per OS/arch (D1/D7). Six bundles total:
#   macos-arm64 · macos-x86_64 · linux-cpu-only · linux-cuda ·
#   windows-cpu-only · windows-cuda
#
# Hosted runners build macos-arm64 / linux-cpu-only / windows-cpu-only on every
# push/PR (the `build` matrix — CPU-only torch, ~500 MB each). GitHub-hosted Intel
# mac (macos-13) runners are unreliable, so the x86_64 mac bundle is built on a
# SELF-HOSTED Intel mac in the separate `build-macos-intel` job. The CUDA bundles
# (linux-cuda / windows-cuda — cu121 torch) build in the separate `build-cuda`
# job. Both the Intel-mac and CUDA jobs are gated to tags + manual dispatch ONLY:
# the Intel-mac job because untrusted fork-PR code must never run on the
# self-hosted machine, the CUDA job because the ~2.5 GB CUDA wheel + build output
# pressures the hosted runner disk and shouldn't run on every PR (D9).
#
# On a v* tag every job packages its bundle and attaches it to a draft GitHub
# Release. macOS ships a windowed BandPrepare.app (PyInstaller ad-hoc signs it
# for free, so Finder launches it straight to a window — no Terminal); Linux and
# Windows ship the onedir folder. The CUDA bundles exceed GitHub's 2 GiB
# per-asset limit, so their archive is byte-split into <2 GiB `.001/.002` parts
# (D9). Notarization still needs paid certs — see below.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # attach assets to the GitHub Release (tag pushes only)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14      # Apple Silicon arm64
            label: macos-arm64
          - os: ubuntu-latest # Linux x86_64 (CPU-only torch)
            label: linux-cpu-only
          - os: windows-latest # Windows x86_64 (CPU-only torch)
            label: windows-cpu-only

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # PySide6 (even the offscreen platform) needs a few system libs on Linux.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      # The portable bundle ships CPU-only torch on Linux/Windows. The default
      # PyPI torch wheel on Linux bundles the full CUDA runtime (~2 GB), which
      # pushes the release .tar.gz over GitHub's 2 GiB per-asset limit; CPU wheels
      # keep every platform's bundle ~500 MB. GPU users install CUDA torch via pip
      # instead (see docs/CLI.md "GPU 가속"). Installing it first (matching pyproject's
      # pin) means the editable install below leaves torch untouched. macOS has no
      # CUDA wheels (MPS/CPU only), so it keeps the default wheels.
      - name: Install CPU-only torch (Linux/Windows)
        if: runner.os != 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.1.0,<2.3.0" "torchaudio>=2.1.0,<2.3.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          # roformer extra installs RoFormer deps (rotary/beartype/einops) so the
          # bundle can include both BS-RoFormer (5a) and Mel-Band (5b). Mel-Band's
          # only librosa use (filters.mel) is vendored as pure NumPy, so no
          # librosa/numba/llvmlite are pulled in. On Linux/Windows torch is already
          # satisfied by the CPU-only install above, so this won't pull CUDA wheels.
          pip install -e ".[gui,build,dev,roformer]"

      - name: Run tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build bundle
        run: pyinstaller --noconfirm bandprepare.spec

      # Frozen smoke test: the bundle must run with NO system ffmpeg and find its
      # bundled deps (see gui.main BANDPREPARE_GUI_SELFTEST). Run from a cwd with
      # an empty PATH segment so a system ffmpeg, if present, is ignored.
      - name: Frozen self-test (Unix)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        run: ./dist/bandprepare/bandprepare

      - name: Frozen self-test (Windows)
        if: runner.os == 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        run: .\dist\bandprepare\bandprepare.exe

      # The same bundle ships a second binary (the CLI). --version exercises its
      # bootstrap + the shared torch stack and must exit 0 (no display/ffmpeg).
      - name: CLI binary smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./dist/bandprepare/bandprepare-cli --version

      - name: CLI binary smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\dist\bandprepare\bandprepare-cli.exe --version

      # --- Code signing / notarization ----------------------------------------
      # macOS bundles are already ad-hoc signed by PyInstaller (free, no certs) —
      # enough for the .app to launch via Finder (Gatekeeper still shows the
      # one-time "unidentified developer" prompt; right-click → Open clears it).
      # To remove that prompt for distribution: import a Developer ID cert,
      # re-codesign the .app, then notarize with `xcrun notarytool submit` (paid).
      # Windows: signtool sign /fd sha256 /tr <timestamp> dist\bandprepare\*.exe
      # Gate the paid steps on repository secrets; skipped here.

      - name: Upload bundle artifact (macOS — .app)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: bandprepare-${{ matrix.label }}
          path: dist/BandPrepare.app
          if-no-files-found: error

      - name: Upload bundle artifact (Linux/Windows — onedir)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: bandprepare-${{ matrix.label }}
          path: dist/bandprepare
          if-no-files-found: error

      # --- Release assets (v* tag pushes only) --------------------------------
      # Package the onedir bundle into one archive and attach it to the tag's
      # GitHub Release. tar.gz on Unix preserves symlinks + exec bits (PyInstaller
      # bundles have both); Compress-Archive (zip) is fine on Windows. Each matrix
      # job appends its own asset to the release that the action auto-creates.
      - name: Package bundle (macOS — .app via ditto)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        # ditto preserves the .app's symlinks + ad-hoc code signature and yields a
        # .zip Finder/Safari auto-expand; --keepParent keeps BandPrepare.app as root.
        run: ditto -c -k --keepParent dist/BandPrepare.app "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.zip"

      - name: Package bundle (Linux)
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
        run: tar -C dist -czf "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.tar.gz" bandprepare

      - name: Package bundle (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist\bandprepare -DestinationPath "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.zip"

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Draft so the release stays hidden until the (unsigned) bundles are
          # reviewed and verified, then published manually.
          draft: true
          files: |
            bandprepare-${{ matrix.label }}-*.tar.gz
            bandprepare-${{ matrix.label }}-*.zip

  # CUDA bundles (linux-cuda / windows-cuda): same one-folder build as the CPU
  # matrix above, but torch comes from the cu121 wheel so the bundle runs on
  # NVIDIA GPUs (device.py `auto` picks cuda; falls back to CPU when no GPU — the
  # CUDA bundle is a superset). Gated to tags + manual dispatch ONLY: the ~2.5 GB
  # CUDA wheel + ~3.5 GB build output pressures the hosted-runner disk, so this
  # must not run on every PR (the CPU `build` matrix already covers PR breakage).
  # The CUDA archive exceeds GitHub's 2 GiB per-asset limit, so it is byte-split
  # into <2 GiB `.001/.002` parts (users rejoin with `cat` / `copy /b`). See D9.
  build-cuda:
    name: ${{ matrix.label }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write   # attach split assets to the GitHub Release (tag pushes)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest  # Linux x86_64 + CUDA
            label: linux-cuda
          - os: windows-latest # Windows x86_64 + CUDA
            label: windows-cuda

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # CUDA torch (~2.5 GB) + the onedir build (~3.5 GB) can exhaust the hosted
      # runner's disk. Reclaim space the build never needs before installing.
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h

      # PySide6 (even the offscreen platform) needs a few system libs on Linux.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      # cu121 = CUDA 12.1 (broadly compatible with current NVIDIA drivers; matches
      # the source-install path documented in docs/DEVELOPMENT.md). Installed first
      # so the editable install below leaves torch untouched. --no-cache-dir keeps
      # the ~2.5 GB wheel from being kept twice (download cache + install).
      - name: Install CUDA torch (cu121)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir "torch>=2.1.0,<2.3.0" "torchaudio>=2.1.0,<2.3.0" --index-url https://download.pytorch.org/whl/cu121

      - name: Verify torch is a CUDA build
        run: python -c "import torch; assert torch.version.cuda, 'torch is not a CUDA build'; print('CUDA', torch.version.cuda)"

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          # torch is already satisfied by the cu121 install above, so this won't
          # pull a CPU wheel over it. roformer extra bundles BS/Mel-Band RoFormer.
          pip install -e ".[gui,build,dev,roformer]"

      - name: Run tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build bundle
        run: pyinstaller --noconfirm bandprepare.spec

      # Frozen smoke test. The hosted runner has no GPU, so this exercises the
      # import / vendored-config / bundled-ffmpeg paths on CPU — it verifies the
      # CUDA-torch bundle is wired up, not that CUDA itself runs (that needs real
      # NVIDIA hardware; see docs).
      - name: Frozen self-test (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        run: ./dist/bandprepare/bandprepare

      - name: Frozen self-test (Windows)
        if: runner.os == 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        run: .\dist\bandprepare\bandprepare.exe

      - name: CLI binary smoke test (Linux)
        if: runner.os == 'Linux'
        run: ./dist/bandprepare/bandprepare-cli --version

      - name: CLI binary smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\dist\bandprepare\bandprepare-cli.exe --version

      - name: Upload bundle artifact (onedir)
        uses: actions/upload-artifact@v7
        with:
          name: bandprepare-${{ matrix.label }}
          path: dist/bandprepare
          if-no-files-found: error

      # --- Release assets (v* tag pushes only) --------------------------------
      # The CUDA archive is larger than GitHub's 2 GiB per-asset limit, so split
      # the single archive into raw <2 GiB byte chunks. Each chunk uploads as its
      # own asset; the user concatenates them back (cat / copy /b) and extracts the
      # reconstituted archive normally. 1900 MiB chunks stay safely under 2 GiB.
      - name: Package bundle (Linux — tar.gz, split)
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
        run: |
          tar -C dist -czf full.tar.gz bandprepare
          split -b 1900M --numeric-suffixes=1 -a 3 full.tar.gz \
            "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.tar.gz."
          rm full.tar.gz
          ls -lh bandprepare-${{ matrix.label }}-*

      - name: Package bundle (Windows — zip, split)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        # 7-Zip (pre-installed on windows runners) compresses and byte-splits in
        # one pass into `...zip.001`, `...zip.002` (raw split volumes — rejoin with
        # `copy /b` then unzip). -v1900m matches the Linux 1900 MiB chunking.
        run: |
          7z a "bandprepare-${{ matrix.label }}-${{ github.ref_name }}.zip" .\dist\bandprepare -v1900m
          dir bandprepare-${{ matrix.label }}-*

      - name: Attach split bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Draft so the release stays hidden until the (unsigned) bundles are
          # reviewed and verified, then published manually.
          draft: true
          files: |
            bandprepare-${{ matrix.label }}-*.tar.gz.*
            bandprepare-${{ matrix.label }}-*.zip.*

  # Intel mac (x86_64): GitHub-hosted macos-13 runners are unreliable, so build
  # on a SELF-HOSTED Intel Mac (labels: self-hosted, macOS, X64). Gated to tags +
  # manual dispatch ONLY — both require write access, so untrusted fork-PR code
  # never executes on the self-hosted machine (this repo is public).
  build-macos-intel:
    name: macos-x86_64 (self-hosted)
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS, X64]
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      # Not actions/setup-python: its macOS Python build hardcodes the install
      # prefix /Users/runner/hostedtoolcache, which isn't writable here. Use uv
      # (already on this runner) to provision Python 3.11 into a job-local seeded
      # venv and put it on PATH for the steps below.
      - name: Set up Python 3.11 (uv)
        run: |
          uv python install 3.11
          uv venv --seed --python 3.11 "$RUNNER_TEMP/bp-venv"
          echo "$RUNNER_TEMP/bp-venv/bin" >> "$GITHUB_PATH"

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          # roformer extra installs RoFormer deps (rotary/beartype/einops) so the
          # bundle can include both BS-RoFormer (5a) and Mel-Band (5b). Mel-Band's
          # only librosa use (filters.mel) is vendored as pure NumPy, so no
          # librosa/numba/llvmlite are pulled in.
          pip install -e ".[gui,build,dev,roformer]"

      - name: Run tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build bundle
        run: pyinstaller --noconfirm bandprepare.spec

      - name: Frozen self-test
        env:
          QT_QPA_PLATFORM: offscreen
          BANDPREPARE_GUI_SELFTEST: "1"
        # Empty PATH so a system ffmpeg (Homebrew /usr/local/bin) can't shadow the
        # bundled one — verifies the portable bundle the way an end user runs it.
        run: |
          mkdir -p "$RUNNER_TEMP/empty"
          PATH="$RUNNER_TEMP/empty" ./dist/bandprepare/bandprepare

      - name: CLI binary smoke test
        run: ./dist/bandprepare/bandprepare-cli --version

      - uses: actions/upload-artifact@v7
        with:
          name: bandprepare-macos-x86_64
          path: dist/BandPrepare.app
          if-no-files-found: error

      - name: Package bundle
        if: startsWith(github.ref, 'refs/tags/')
        # ditto preserves the .app's symlinks + ad-hoc code signature (see the
        # macOS packaging note in the `build` job above).
        run: ditto -c -k --keepParent dist/BandPrepare.app "bandprepare-macos-x86_64-${{ github.ref_name }}.zip"

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: bandprepare-macos-x86_64-${{ github.ref_name }}.zip

      # Self-hosted runners do NOT reset between jobs — reclaim the ~1.4G build
      # output and any leftover archive so the disk doesn't fill up over time.
      - name: Clean workspace
        if: always()
        run: rm -rf build dist bandprepare-macos-x86_64-*.zip
